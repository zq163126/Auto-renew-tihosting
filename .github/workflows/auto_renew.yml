name: Auto Renew Tickhosting

on:
 # schedule:
#    - cron: '0 0 */4 * *'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  Auto_renew_tickhosting:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Proxy Setup
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
          # 将 Python 代码存入环境变量，避开所有缩进和字符集问题
          PYTHON_SCRIPT: |
            import os, json, base64
            from urllib.parse import urlparse, parse_qs, unquote
            def get_conf():
                url = os.environ.get("PROXY_NODE", "").strip()
                p = urlparse(url)
                scheme = p.scheme.lower()
                params = {k: v[0] for k, v in parse_qs(p.query).items()}
                c = {"log": {"level": "info"}, "inbounds": [{"type": "socks", "tag": "socks-in", "listen": "127.0.0.1", "listen_port": 10808}], "outbounds": []}
                auth = unquote(p.netloc.split('@')[0] if '@' in p.netloc else "")
                host, port = p.hostname, int(p.port or 443)
                sni = params.get("sni", host)
                out = {"tag": "proxy", "server": host, "server_port": port}
                if scheme == "vless":
                    out.update({"type": "vless", "uuid": auth or p.username, "packet_encoding": "xudp", "tls": {"enabled": True, "server_name": sni, "insecure": True}})
                    if params.get("type") == "ws":
                        out["transport"] = {"type": "ws", "path": unquote(params.get("path", "/")), "headers": {"Host": sni}}
                    if params.get("security") == "reality":
                        out["tls"]["reality"] = {"enabled": True, "public_key": params.get("pbk", ""), "short_id": params.get("sid", "")}
                elif scheme == "tuic":
                    u, pwd = auth.split(':', 1) if ':' in auth else (auth, "")
                    out.update({"type": "tuic", "uuid": u, "password": pwd, "congestion_control": params.get("congestion_control", "cubic"), "tls": {"enabled": True, "server_name": sni, "alpn": ["h3"], "insecure": True}})
                elif scheme in ["hysteria2", "hy2"]:
                    out.update({"type": "hysteria2", "password": auth, "tls": {"enabled": True, "server_name": sni, "insecure": True}})
                elif scheme == "vmess":
                    try:
                        raw = url[8:].split("#")[0]
                        v = json.loads(base64.b64decode(raw + "="*(4-len(raw)%4)).decode())
                        out.update({"type": "vmess", "server": v['add'], "server_port": int(v['port']), "uuid": v['id'], "security": "auto"})
                        if v.get('tls') == "tls": out["tls"] = {"enabled": True, "server_name": v.get('sni', v['add']), "insecure": True}
                    except: pass
                c["outbounds"].append(out)
                c["outbounds"].append({"type": "direct", "tag": "direct"})
                return c
            with open("config.json", "w") as f:
                json.dump(get_conf(), f, indent=2)
        run: |
          if [ -z "$PROXY_NODE" ]; then
            echo "No proxy configured, skip."
          else
            # 1. 下载 Sing-box
            TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
            VERSION=${TAG#v}
            wget -q "https://github.com/SagerNet/sing-box/releases/download/${TAG}/sing-box-${VERSION}-linux-amd64.tar.gz"
            tar -xzf "sing-box-${VERSION}-linux-amd64.tar.gz"
            mv "sing-box-${VERSION}-linux-amd64/sing-box" . && chmod +x sing-box
            
            # 2. 从环境变量中直接运行 Python
            python3 -c "$PYTHON_SCRIPT"
            
            # 3. 启动并验证
            ./sing-box run -c config.json > proxy.log 2>&1 &
            sleep 15
            if curl -x socks5://127.0.0.1:10808 -s --max-time 15 https://www.google.com > /dev/null; then
              echo "PROXY_SOCKS5=socks5://127.0.0.1:10808" >> $GITHUB_ENV
              echo "Proxy connected."
            else
              cat proxy.log
              exit 1
            fi
          fi

      - name: Run auto renew script
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          PTERODACTYL_SESSION: ${{ secrets.PTERODACTYL_SESSION }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python auto_renew.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add last_renew_data.txt || true
          git diff --cached --quiet || (git commit -m "Auto Update" && git push origin main)
